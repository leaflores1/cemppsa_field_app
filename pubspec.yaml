name: cemppsa_field_app
description: App de campo CEMPPSA (offline + sync)
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- Core ---
  provider: ^6.1.5
  uuid: ^4.5.1
  intl: ^0.20.2

  # --- Local storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.0            # ← agrega esto

  # --- Conectividad / API ---
  connectivity_plus: ^6.0.3
  http: ^1.2.2

  # --- Export / apertura de archivos ---
  open_filex: ^4.5.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/cemppsa_logo.png
